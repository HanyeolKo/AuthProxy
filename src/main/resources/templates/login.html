<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        /* 버튼 기본 스타일 */
        .google-login-btn {
            background-color: #4285F4;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 4px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: Arial, sans-serif;
        }
        .google-login-btn:hover {
            background-color: #357ae8;
        }
        /* 구글 로고 아이콘(간단 SVG) */
        .google-logo {
            width: 20px;
            height: 20px;
        }
    </style>
</head>
<body>
<a href="/oauth2/authorization/google">
    <button type="button" class="google-login-btn">
        <svg class="google-logo" viewBox="0 0 533.5 544.3" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285f4" d="M533.5 278.4c0-17.3-1.5-34-4.3-50.3H272v95.4h146.9c-6.3 34-25.4 62.8-54 82v68h87.1c50.9-46.9 80.5-116.1 80.5-195.1z"/>
            <path fill="#34a853" d="M272 544.3c72.6 0 133.7-24 178.2-65.1l-87.1-68c-24 16-54.8 25-91.1 25-69.9 0-129.3-47.1-150.5-110.3h-89.5v69.8c44.2 87.3 134 148.6 239.9 148.6z"/>
            <path fill="#fbbc04" d="M121.5 323.9c-10.4-30.9-10.4-64.5 0-95.4v-69.8H32c-34.2 67.9-34.2 148.5 0 216.4l89.5-69.8z"/>
            <path fill="#ea4335" d="M272 107.7c38.7 0 73.4 13.3 100.8 39.5l75.6-75.6C399.1 24 338 0 272 0 166 0 76.2 61.3 32 148.6l89.5 69.8c21.2-63.2 80.6-110.7 150.5-110.7z"/>
        </svg>
        구글 계정으로 로그인
    </button>
</a>
</body>
</html>
